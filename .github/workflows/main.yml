name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.4

      - name: Build EXE
        run: make

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: sing-box-service.exe
          token: ${{ secrets.GITHUB_TOKEN }}
